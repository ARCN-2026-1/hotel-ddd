name: SonarCloud

on:
  push:
    branches:
      - develop
      - main

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Discover Python services
        id: python-services
        shell: bash
        run: |
          shopt -s nullglob
          discovered_services=""

          for pyproject in services/*/pyproject.toml; do
            service_dir="$(dirname "$pyproject")"
            discovered_services+="$service_dir"$'\n'
          done

          if [ -n "$discovered_services" ]; then
            echo "has_services=true" >> "$GITHUB_OUTPUT"
            echo 'services<<EOF' >> "$GITHUB_OUTPUT"
            printf '%s' "$discovered_services" >> "$GITHUB_OUTPUT"
            echo >> "$GITHUB_OUTPUT"
            echo 'EOF' >> "$GITHUB_OUTPUT"
          else
            echo "has_services=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.python-services.outputs.has_services == 'true'
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        if: steps.python-services.outputs.has_services == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Python coverage reports
        if: steps.python-services.outputs.has_services == 'true'
        shell: bash
        run: |
          while IFS= read -r service_dir; do
            [ -z "$service_dir" ] && continue

            pushd "$service_dir"
            uv sync --dev
            uv run pytest --cov=internal --cov-report=xml:coverage.xml --cov-report=term-missing
            popd

            coverage_file="$(basename "$service_dir")-coverage.xml"
            cp "$service_dir/coverage.xml" "$coverage_file"
          done <<< "${{ steps.python-services.outputs.services }}"

      - name: Discover Java coverage reports
        id: java-coverage
        shell: bash
        run: |
          shopt -s nullglob
          discovered_reports=""

          for report in services/*/build/reports/jacoco/test/jacocoTestReport.xml services/*/target/site/jacoco/jacoco.xml; do
            discovered_reports+="$report"$'\n'
          done

          if [ -n "$discovered_reports" ]; then
            echo "has_reports=true" >> "$GITHUB_OUTPUT"
            echo 'reports<<EOF' >> "$GITHUB_OUTPUT"
            printf '%s' "$discovered_reports" >> "$GITHUB_OUTPUT"
            echo >> "$GITHUB_OUTPUT"
            echo 'EOF' >> "$GITHUB_OUTPUT"
          else
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Sonar arguments
        id: sonar-args
        shell: bash
        run: |
          args=()

          if compgen -G '*-coverage.xml' > /dev/null; then
            python_coverage_files=$(printf '%s\n' *-coverage.xml | paste -sd, -)
            args+=("-Dsonar.python.coverage.reportPaths=$python_coverage_files")
          fi

          if [ "${{ steps.java-coverage.outputs.has_reports }}" = 'true' ]; then
            java_coverage_files=$(printf '%s' "${{ steps.java-coverage.outputs.reports }}" | paste -sd, -)
            args+=("-Dsonar.coverage.jacoco.xmlReportPaths=$java_coverage_files")
          fi

          if [ ${#args[@]} -gt 0 ]; then
            printf -v joined_args '%s ' "${args[@]}"
            echo "has_coverage=true" >> "$GITHUB_OUTPUT"
            echo "args=${joined_args% }" >> "$GITHUB_OUTPUT"
          else
            echo "has_coverage=false" >> "$GITHUB_OUTPUT"
            echo "args=" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarCloud scan with coverage
        if: steps.sonar-args.outputs.has_coverage == 'true'
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: ${{ steps.sonar-args.outputs.args }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud scan without coverage
        if: steps.sonar-args.outputs.has_coverage != 'true'
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
