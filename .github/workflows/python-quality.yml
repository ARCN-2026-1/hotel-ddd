name: Python Quality

on:
  pull_request:
    branches:
      - develop

jobs:
  python-services-quality:
    name: Python Services Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover Python services
        id: python-services
        shell: bash
        run: |
          shopt -s nullglob
          discovered_services=""

          for pyproject in services/*/pyproject.toml; do
            service_dir="$(dirname "$pyproject")"
            discovered_services+="$service_dir"$'\n'
          done

          if [ -n "$discovered_services" ]; then
            echo "has_services=true" >> "$GITHUB_OUTPUT"
            echo 'services<<EOF' >> "$GITHUB_OUTPUT"
            printf '%s' "$discovered_services" >> "$GITHUB_OUTPUT"
            echo >> "$GITHUB_OUTPUT"
            echo 'EOF' >> "$GITHUB_OUTPUT"
          else
            echo "has_services=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.python-services.outputs.has_services == 'true'
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        if: steps.python-services.outputs.has_services == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python services
        if: steps.python-services.outputs.has_services == 'true'
        shell: bash
        run: |
          while IFS= read -r service_dir; do
            [ -z "$service_dir" ] && continue

            echo "Validating $service_dir"
            pushd "$service_dir"
            uv sync --dev
            uv run ruff check .
            uv run black --check .
            uv run pyright
            uv run pytest --cov=internal --cov-report=term-missing
            popd
          done <<< "${{ steps.python-services.outputs.services }}"

      - name: No Python services detected
        if: steps.python-services.outputs.has_services != 'true'
        run: |
          echo "No Python services found under services/*/pyproject.toml"
